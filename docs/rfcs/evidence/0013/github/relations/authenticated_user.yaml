api_version: duckdb_api/v1
kind: relation
id: authenticated_user
schema: static

columns:
  - id: id
    type: BIGINT
    nullable: false
    extract: $.id
  - id: login
    type: VARCHAR
    nullable: false
    extract: $.login
  - id: site_admin
    type: BOOLEAN
    nullable: false
    extract: $.site_admin

auth:
  mode: credential
  credential: github_token

resources:
  max_response_bytes_per_page: 65536
  max_response_bytes_per_scan: 65536
  max_records_per_page: 1
  max_records_per_scan: 1
  max_extracted_string_bytes: 256

operations:
  - id: github_authenticated_user
    fallback: true
    cardinality: one
    replay_safety: safe
    request:
      protocol: rest
      method: GET
      origin:
        scheme: https
        host: api.github.com
        port: 443
      path: /user
      query: []
      headers:
        - name: Accept
          value: application/vnd.github+json
        - name: User-Agent
          value: duckdb-api/0.6.0
        - name: X-GitHub-Api-Version
          value: "2022-11-28"
    response:
      source: root_object
    pagination:
      strategy: disabled
