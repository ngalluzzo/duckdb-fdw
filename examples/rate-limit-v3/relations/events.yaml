api_version: duckdb_api/v3
kind: relation
id: events
schema: static

columns:
  - id: event_id
    type: VARCHAR
    nullable: false
    extract: $.id

auth:
  mode: anonymous

resources:
  max_response_bytes_per_page: 1048576
  max_response_bytes_per_scan: 1048576
  max_records_per_page: 100
  max_records_per_scan: 100
  max_extracted_string_bytes: 512

operations:
  - id: list_events
    fallback: true
    cardinality: many
    replay_safety: safe
    retry:
      max_attempts_per_step: 3
      max_delay_milliseconds: 100
      max_cumulative_waiting_milliseconds_per_scan: 250
    rate_limit:
      statuses: [429]
      mode: wait_if_deadline_allows
      operation_family: event_reads
      principal_scope: credential_authority
      guidance:
        - header: retry-after
          format: retry_after
      remaining:
        header: x-ratelimit-remaining
      remote_bucket:
        header: x-ratelimit-resource
      max_attempts_per_step: 3
      max_delay_milliseconds: 30000
      max_cumulative_waiting_milliseconds_per_scan: 30000
    request:
      protocol: rest
      method: GET
      origin:
        scheme: https
        host: api.example.com
        port: 443
      path: /events
      query: []
      headers: []
    response:
      source: root_array
    pagination:
      strategy: disabled
