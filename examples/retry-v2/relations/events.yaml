api_version: duckdb_api/v2
kind: relation
id: events
schema: static

columns:
  - id: event_id
    type: VARCHAR
    nullable: false
    extract: $.id

auth:
  mode: anonymous

resources:
  max_response_bytes_per_page: 1048576
  max_response_bytes_per_scan: 1048576
  max_records_per_page: 100
  max_records_per_scan: 100
  max_extracted_string_bytes: 512

operations:
  - id: list_events
    fallback: true
    cardinality: many
    replay_safety: safe
    retry:
      max_attempts_per_step: 3
      max_delay_milliseconds: 100
      max_cumulative_waiting_milliseconds_per_scan: 250
    request:
      protocol: rest
      method: GET
      origin:
        scheme: https
        host: api.example.com
        port: 443
      path: /events
      query: []
      headers: []
    response:
      source: root_array
    pagination:
      strategy: disabled
