api_version: duckdb_api/v1
kind: connector
id: github
version: 1.0.0
extractor_dialect: duckdb_api/json_path_v1

credentials:
  - id: github_token
    kind: bearer
    secret_field: token
    placement: authorization_header
    destinations:
      - scheme: https
        host: api.github.com
        port: 443

network_policy:
  origins:
    - scheme: https
      host: api.github.com
      port: 443
  redirects: deny
  private_addresses: deny
  link_local_addresses: deny
  loopback_addresses: deny
  max_response_bytes: 8388608

relations:
  - duckdb_login_search_page
  - authenticated_user
  - authenticated_repositories
  - viewer_repository_metrics
