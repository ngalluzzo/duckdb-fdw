api_version: duckdb_api/v1
kind: relation
id: character_search
schema: static

columns:
  - id: id
    type: BIGINT
    nullable: false
    extract: $.id
  - id: name
    type: VARCHAR
    nullable: false
    extract: $.name
  - id: status
    type: VARCHAR
    nullable: false
    extract: $.status
  - id: species
    type: VARCHAR
    nullable: false
    extract: $.species
  - id: origin_name
    type: VARCHAR
    nullable: false
    extract: $.origin.name

inputs:
  - id: status
    type: VARCHAR
    nullable: true

auth:
  mode: anonymous

resources:
  max_response_bytes_per_page: 65536
  max_response_bytes_per_scan: 65536
  max_records_per_page: 20
  max_records_per_scan: 20
  max_extracted_string_bytes: 256

operations:
  - id: search_characters
    fallback: true
    cardinality: many
    replay_safety: safe
    request:
      protocol: rest
      method: GET
      origin:
        scheme: https
        host: rickandmortyapi.com
        port: 443
      path: /api/character
      query:
        - name: status
          input: status
          encoding: form_urlencoded
          omit_when_unbound: true
          omit_when_null: true
      headers: []
    response:
      source: terminal_collection
      records: $.results[*]
    pagination:
      strategy: disabled
