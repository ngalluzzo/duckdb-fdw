api_version: duckdb_api/v3
kind: relation
id: fail_events
schema: static

columns:
  - id: event_id
    type: VARCHAR
    nullable: false
    extract: $.id

auth:
  mode: anonymous

resources:
  max_response_bytes_per_page: 1048576
  max_response_bytes_per_scan: 1048576
  max_records_per_page: 40
  max_records_per_scan: 40
  max_extracted_string_bytes: 512

operations:
  - id: list_fail_events
    fallback: true
    cardinality: many
    replay_safety: safe
    rate_limit:
      statuses: [429]
      mode: fail
      operation_family: fail_requests
      principal_scope: credential_authority
    request:
      protocol: rest
      method: GET
      origin: {scheme: https, host: api.example.com, port: 8443}
      path: /v3/fail-events
      query: []
      headers: []
    response: {source: root_array}
    pagination: {strategy: disabled}
