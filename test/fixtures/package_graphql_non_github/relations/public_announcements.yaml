api_version: duckdb_api/v1
kind: relation
id: public_announcements
schema: static

columns:
  - id: announcement_id
    type: VARCHAR
    nullable: false
    extract: $.id
  - id: headline
    type: VARCHAR
    nullable: false
    extract: $.headline

auth:
  mode: anonymous

resources:
  max_response_bytes_per_page: 1048576
  max_response_bytes_per_scan: 1048576
  max_records_per_page: 40
  max_records_per_scan: 40
  max_extracted_string_bytes: 512

operations:
  - id: list_public_announcements
    fallback: true
    cardinality: many
    replay_safety: safe
    request:
      protocol: rest
      method: GET
      origin:
        scheme: https
        host: api.example.com
        port: 8443
      path: /v1/public-announcements
      query: []
      headers:
        - name: X-Client
          value: duckdb-api-test
    response:
      source: root_array
    pagination:
      strategy: disabled
